services:
  - type: web
    name: scalelab-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: CORS_ORIGIN
        sync: false
      - key: RATE_LIMIT_RPM
        value: "10"
      - key: RATE_LIMIT_BURST
        value: "3"
